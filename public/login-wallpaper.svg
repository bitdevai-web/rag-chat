<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6d28d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#312e81;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <pattern id="dots" x="100" y="100" width="100" height="100" patternUnits="userSpaceOnUse">
      <circle cx="50" cy="50" r="2" fill="#ffffff" opacity="0.05"/>
    </pattern>
  </defs>
  
  <!-- Background gradient -->
  <rect width="1920" height="1080" fill="url(#mainGradient)"/>
  
  <!-- Dot pattern -->
  <rect width="1920" height="1080" fill="url(#dots)"/>
  
  <!-- Animated floating blobs (static visual representation) -->
  <circle cx="200" cy="150" r="300" fill="#06b6d4" opacity="0.15" filter="url(#glow)" />
  <circle cx="1700" cy="850" r="350" fill="#a855f7" opacity="0.2" filter="url(#glow)" />
  <circle cx="900" cy="500" r="250" fill="#3b82f6" opacity="0.08" filter="url(#glow)" />
  
  <!-- Knowledge/Data network visualization -->
  <!-- Node connections (lines) -->
  <line x1="400" y1="250" x2="700" y2="450" stroke="#60a5fa" stroke-width="2" opacity="0.3" />
  <line x1="700" y1="450" x2="1100" y2="350" stroke="#60a5fa" stroke-width="2" opacity="0.3" />
  <line x1="1100" y1="350" x2="1400" y2="650" stroke="#60a5fa" stroke-width="2" opacity="0.3" />
  <line x1="400" y1="250" x2="1000" y2="700" stroke="#a78bfa" stroke-width="2" opacity="0.25" />
  <line x1="1400" y1="650" x2="600" y2="800" stroke="#60a5fa" stroke-width="2" opacity="0.3" />
  
  <!-- Diagonal network lines -->
  <line x1="300" y1="400" x2="600" y2="250" stroke="#818cf8" stroke-width="1.5" opacity="0.2" />
  <line x1="1500" y1="300" x2="1200" y2="700" stroke="#818cf8" stroke-width="1.5" opacity="0.2" />
  <line x1="800" y1="200" x2="1200" y2="600" stroke="#c7d2fe" stroke-width="1" opacity="0.15" />
  
  <!-- Nodes (circles) -->
  <circle cx="400" cy="250" r="8" fill="#60a5fa" opacity="0.7" filter="url(#glow)" />
  <circle cx="700" cy="450" r="10" fill="#a78bfa" opacity="0.8" filter="url(#glow)" />
  <circle cx="1100" cy="350" r="8" fill="#60a5fa" opacity="0.7" filter="url(#glow)" />
  <circle cx="1400" cy="650" r="9" fill="#818cf8" opacity="0.7" filter="url(#glow)" />
  <circle cx="600" cy="800" r="7" fill="#a78bfa" opacity="0.6" filter="url(#glow)" />
  <circle cx="300" cy="400" r="6" fill="#c7d2fe" opacity="0.5" filter="url(#glow)" />
  <circle cx="1500" cy="300" r="6" fill="#c7d2fe" opacity="0.5" filter="url(#glow)" />
  <circle cx="1000" cy="700" r="7" fill="#818cf8" opacity="0.6" filter="url(#glow)" />
  
  <!-- Central knowledge hub -->
  <g opacity="0.4">
    <circle cx="950" cy="450" r="120" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.4" />
    <circle cx="950" cy="450" r="80" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.3" />
    <circle cx="950" cy="450" r="40" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.3" />
    <circle cx="950" cy="450" r="15" fill="#818cf8" opacity="0.6" filter="url(#glow)" />
  </g>
  
  <!-- Top left accent corner -->
  <rect x="0" y="0" width="400" height="300" fill="url(#mainGradient)" opacity="0.1" />
  <circle cx="150" cy="150" r="200" fill="#06b6d4" opacity="0.08" />
  
  <!-- Bottom right accent corner -->
  <circle cx="1750" cy="900" r="220" fill="#a855f7" opacity="0.1" />
</svg>