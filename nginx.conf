# Nginx reverse proxy config for RAG Chat
# Copy to: /etc/nginx/sites-available/rag-chat
# Enable:  ln -s /etc/nginx/sites-available/rag-chat /etc/nginx/sites-enabled/rag-chat
# Reload:  nginx -t && systemctl reload nginx
#
# HTTPS: apt install certbot python3-certbot-nginx -y
#        certbot --nginx -d your-domain.com

server {
    listen 80;
    server_name _;          # Replace _ with your domain, e.g. chat.example.com

    # Max upload size (PDF / DOCX documents)
    client_max_body_size 50M;

    location / {
        proxy_pass          http://127.0.0.1:3000;
        proxy_http_version  1.1;

        # WebSocket / hot-reload support
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        'upgrade';

        # Standard proxy headers
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_cache_bypass  $http_upgrade;

        # SSE / streaming (chat responses must not be buffered)
        proxy_buffering     off;
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        chunked_transfer_encoding on;
    }
}
