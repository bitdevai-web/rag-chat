name: Manual Deploy (RAG Chat)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger server deploy
        env:
          DEPLOY_TOKEN: ${{ secrets.RAGCHAT_DEPLOY_TOKEN }}
        run: |
          set -euo pipefail
          curl -sS -X POST "https://ragchat.mydevfactory.com/github-webhook-ragchat" \
            -H "Content-Type: application/json" \
            -H "x-deploy-token: ${DEPLOY_TOKEN}" \
            -d '{"ref":"main"}'
